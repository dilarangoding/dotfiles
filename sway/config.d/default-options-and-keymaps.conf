#################################################
#                Configuration                  #
#################################################

set $mod Mod4

set $left h
set $down j
set $up k
set $right l

set $term alacritty
set $browser flatpak run app.zen_browser.zen

set $rofi_cmd rofi \
        -terminal '$term'

set $powermenu $HOME/.config/rofi/bin/powermenu

set $menu $rofi_cmd -show drun -replace

### Idle configuration
exec swayidle -w \
         timeout 300 'swaylock -f -c 000000' \
         timeout 420 'swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
         timeout 600 'swaymsg "output * power on"; sleep 1; systemctl suspend' \
         before-sleep 'swaylock -f -c 000000'

set $gnome-schema org.gnome.desktop.interface

## Lock Screen
bindsym $mod+Escape exec "swaylock -f -c 000000 && systemctl suspend"

# Rotate output clockwise
bindsym $mod+F9 output eDP-1 transform 0
bindsym $mod+Ctrl+F9 output eDP-1 transform 90
# Rotate output anticlockwise
bindsym $mod+Shift+F9 output eDP-1 transform 180

bindsym $mod+Mod1+space exec ~/.config/sway/scripts/background-swap.sh

### Key bindings
#
# Basics:
#
bindsym $mod+Return exec $term

bindsym $mod+W kill

bindsym $mod+space exec rofi -show drun

# Take a screenshot
bindsym $mod+Shift+s exec sh -c 'grim -g "$(slurp)" - | tee ~/Pictures/$(date +%F_T).png | wl-copy'
bindsym $mod+Shift+p exec sh -c 'grim - | tee ~/Pictures/$(date +%F_T).png | wl-copy'

# Clipboard manager
bindsym $mod+Shift+v exec "cliphist list | rofi -dmenu  | cliphist decode | wl-copy && wtype -M ctrl -M shift -k v -m ctrl -m shift"

# Drag floating windows by holding down $mod and left mouse button.
floating_modifier $mod normal

# Reload the configuration file
bindsym $mod+Shift+R reload

# Exit sway
bindsym $mod+Shift+E exec swaynag -t warning -m 'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' -B 'Yes, exit sway' 'swaymsg exit'
#
# Moving around:
#
bindsym $mod+Left focus left
bindsym $mod+Down focus down
bindsym $mod+Up focus up
bindsym $mod+Right focus right

bindsym $mod+Shift+Left move left
bindsym $mod+Shift+Down move down
bindsym $mod+Shift+Up move up
bindsym $mod+Shift+Right move right

bindsym $mod+Tab workspace next
bindsym $mod+Shift+Tab workspace prev
bindsym $mod+Control+Tab workspace back_and_forth
#
# Workspaces:
#
bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

bindsym $mod+Shift+1 move container to workspace number 1
bindsym $mod+Shift+2 move container to workspace number 2
bindsym $mod+Shift+3 move container to workspace number 3
bindsym $mod+Shift+4 move container to workspace number 4
bindsym $mod+Shift+5 move container to workspace number 5
bindsym $mod+Shift+6 move container to workspace number 6
bindsym $mod+Shift+7 move container to workspace number 7
bindsym $mod+Shift+8 move container to workspace number 8
bindsym $mod+Shift+9 move container to workspace number 9
bindsym $mod+Shift+0 move container to workspace number 10
#
# Layout stuff:
#
bindsym $mod+H split h
bindsym $mod+V split v

bindsym $mod+F fullscreen toggle
bindsym $mod+T floating toggle
bindsym $mod+a focus parent
#
# Scratchpad:
#
bindsym $mod+O move scratchpad
bindsym $mod+S scratchpad show
#
# Resizing containers:
#
bindsym $mod+equal resize grow width 10 px
bindsym $mod+minus resize shrink width 10 px
bindsym $mod+Shift+equal resize grow height 10 px
bindsym $mod+Shift+minus resize shrink height 10 px

#
# App shortcuts
#
bindsym $mod+Shift+B exec $browser
bindsym $mod+Shift+Mod1+B exec $browser --private-window
bindsym $mod+Shift+F exec nautilus --new-window
bindsym $mod+Shift+T exec $term -e btop
bindsym $mod+Shift+N exec $term -e nvim
bindsym $mod+Shift+D exec $term -e lazydocker
bindsym $mod+Shift+O exec flatpak run md.obsidian.Obsidian


# =========================
# Notifications & Misc
# =========================
bindsym $mod+comma exec dunstctl close
bindsym $mod+Shift+comma exec dunstctl close-all
bindsym $mod+Control+comma exec dunstctl set-paused toggle
